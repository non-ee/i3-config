[colors]
background = #282a36
foreground = #faedcd
bar-border = #ffe5d9
label = #000000
disabled = #707880

aqua = #83c092
purple = #d699b6
blue = #7fbbb3
green = #a7c080
yellow = #dbbc7f
red = #e67e89
orange = #e69875
grey = #9da9a0

;===========================================================

[bar/main]
monitor = ${env:MONITOR:}
bottom = true
width = 100%
height = 22pt

radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 0pt

border-size = 0pt
border-color = ${colors.background}

padding-left = 0
padding-right = 0
module-margin = 0

separator = |
separator-foreground = ${colors.disabled}

font-0 = "Bedstead:size=12:weight=bold;4.0"
font-1 = "MesloLGS NF:size=11:weight=bold;3.0"

modules-left = i3
modules-center = date
modules-right = xkeyboard pulseaudio memory battery

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
override-redirect = false


[module/systray]
type = internal/tray
format-margin = 5pt
tray-spacing = 10pt

[module/i3]
type = internal/i3
pin-workspaces = true

label-mode = %mode%
label-mode-padding = 1
label-mode-foreground = #e60053

label-focused = %index%
label-focused-foreground = #000000
label-focused-background = #ffdac6
label-focused-padding = 1

label-unfocused = %index%
label-unfocused-padding = 1

label-visible = %index%
label-visible-padding = 1

label-urgent = %index%
label-urgent-foreground = #000000
label-urgent-background = #bd2c40
label-urgent-padding = 1

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume = <label-volume>
format-volume-foreground = ${colors.foreground}
format-volume-padding = 1

label-volume = %percentage%%
label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format = <label>
format-foreground = ${colors.foreground}
format-padding = 1

label = %gb_used:2%

[module/date]
type = internal/date
interval = 1
date = %b %d, %H:%M %p

format = <label>
format-foreground = ${colors.foreground}
format-padding = 1
label = %date%

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC

format-charging = CHR <label-charging>
format-discharging = <label-discharging>
format-charging-foreground = ${colors.foreground}
format-discharging-foreground = ${colors.foreground}
format-charging-padding = 1
format-discharging-padding = 1

label-charging = %percentage%%
label-discharging = %percentage%%

[module/xkeyboard]
type = internal/xkeyboard

blacklist-0 = num lock
blacklist-1 = scroll lock

format = <label-layout>
format-foreground = ${colors.foreground}
format-padding = 1
label-layout = %name%


[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
